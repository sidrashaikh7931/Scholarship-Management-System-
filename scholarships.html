<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse available scholarships on ScholarHub">
  <title>Scholarships | ScholarHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
    <div class="container">
      <a class="navbar-brand navbar-brand-custom d-flex align-items-center" href="/student-dashboard">
        <span class="navbar-brand-icon">🎓</span> ScholarHub
      </a>
      <div class="d-flex align-items-center gap-3">
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
        <a href="/student-dashboard" class="btn btn-outline-custom btn-sm">
          <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
        </a>
      </div>
    </div>
  </nav>

  <div class="dashboard-container">
    <div class="section-header d-flex justify-content-between align-items-center flex-wrap gap-2">
      <div>
        <h1 class="section-title">All Scholarships</h1>
        <p class="section-subtitle">Explore and apply for scholarships</p>
      </div>
      <div class="search-wrapper">
        <i class="bi bi-search search-icon"></i>
        <input type="text" class="search-input" id="searchInput" placeholder="Search scholarships...">
      </div>
    </div>

    <div class="row g-3" id="scholarshipGrid">
      <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
      </div>
    </div>
    <div id="paginationContainer" class="mt-4"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/scholarships.js"></script>
</body>
</html>
