<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your ScholarHub account to start applying for scholarships">
  <title>Register | ScholarHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <!-- Brand Panel -->
    <div class="auth-brand-panel">
      <div class="auth-brand-title">🎓 ScholarHub</div>
      <p class="auth-brand-subtitle">
        Join thousands of students who have secured scholarships through our platform.
      </p>
    </div>

    <!-- Register Form Panel -->
    <div class="auth-form-panel">
      <div class="auth-form-card fade-in">
        <h2>Create Account</h2>
        <p class="subtitle">Fill in your details to get started</p>

        <form id="registerForm">
          <div class="mb-3">
            <label class="form-label-custom" for="regName">Full Name</label>
            <div class="input-group-icon">
              <i class="bi bi-person input-icon"></i>
              <input type="text" class="form-control form-control-custom" id="regName"
                     placeholder="Enter your full name" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label-custom" for="regEmail">Email Address</label>
            <div class="input-group-icon">
              <i class="bi bi-envelope input-icon"></i>
              <input type="email" class="form-control form-control-custom" id="regEmail"
                     placeholder="you@example.com" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label-custom" for="regPhone">Phone Number</label>
            <div class="input-group-icon">
              <i class="bi bi-phone input-icon"></i>
              <input type="tel" class="form-control form-control-custom" id="regPhone"
                     placeholder="Enter phone number">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label-custom" for="regPassword">Password</label>
            <div class="input-group-icon">
              <i class="bi bi-lock input-icon"></i>
              <input type="password" class="form-control form-control-custom" id="regPassword"
                     placeholder="Min. 6 characters" required minlength="6">
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label-custom" for="regConfirmPassword">Confirm Password</label>
            <div class="input-group-icon">
              <i class="bi bi-lock-fill input-icon"></i>
              <input type="password" class="form-control form-control-custom" id="regConfirmPassword"
                     placeholder="Re-enter your password" required minlength="6">
            </div>
          </div>

          <button type="submit" class="btn btn-primary-custom w-100 py-2 mb-3" id="registerBtn">
            <span class="btn-text">Create Account</span>
            <span class="spinner-border spinner-border-sm d-none" id="registerSpinner" role="status"></span>
          </button>
        </form>

        <p class="text-center mt-3" style="font-size:0.9rem;color:var(--text-secondary);">
          Already have an account?
          <a href="/" style="font-weight:600;">Sign in</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
