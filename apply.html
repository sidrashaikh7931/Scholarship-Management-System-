<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Apply for a scholarship on ScholarHub">
  <title>Apply | ScholarHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
    <div class="container">
      <a class="navbar-brand navbar-brand-custom d-flex align-items-center" href="/student-dashboard">
        <span class="navbar-brand-icon">🎓</span> ScholarHub
      </a>
      <div class="d-flex align-items-center gap-3">
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
        <a href="/student-dashboard" class="btn btn-outline-custom btn-sm">
          <i class="bi bi-arrow-left me-1"></i> Back
        </a>
      </div>
    </div>
  </nav>

  <div class="dashboard-container" style="max-width:800px;">
    <div class="card-custom p-4 fade-in" id="applyCard">
      <div class="text-center py-4">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Loading scholarship details...</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/application.js"></script>
</body>
</html>
